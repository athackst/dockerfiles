name: CI Update

on:
  repository_dispatch:
    types:
      - ci-update
  push:
    branches:
      - main
    paths:
      - ".copier-answers.ci.yml"
      - ".github/workflows/site.yml"
      - ".github/workflows/ci_update.yml"
      - ".github/workflows/pr_bot.yml"
      - ".github/workflows/release_draft.yml"
      - ".github/ci-config.yml"
      - ".github/release_template.yml"
  workflow_dispatch:

concurrency:
  group: "ci-update-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  ci-update:
    permissions:
      contents: write
      pull-requests: write
      # Required for creating an issue if the workflow fails
      issues: write
      # Required in this environment to allow PRs that modify .github/workflows/*.
      actions: write
    uses: athackst/ci/.github/workflows/ci_updater.yml@main
    with:
      create-pr: true
      automerge: true
    secrets:
      token: ${{ secrets.CI_BOT_TOKEN }}
