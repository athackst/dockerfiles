name: Run generate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run generate
        run: |
          set -euo pipefail
          ./generate.py

      - name: Check for generated changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "Generated files are up to date." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
            {
              echo "Generated files are out of date."
              echo
              echo "Run \`./generate.py\` and commit the updated files."
              echo
              echo "Changed files:"
              git diff --name-only
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if generated files changed
        if: ${{ steps.changes.outputs.stale == 'true' }}
        run: |
          echo "Generated files are out of date. Run ./generate.py and commit the results."
          git diff --stat
          exit 1
