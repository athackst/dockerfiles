name: PR Automerge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

concurrency:
  group: "pr-automerge-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  pr-automerge:
    permissions:
      contents: write
      pull-requests: write
      checks: read
    uses: athackst/ci/.github/workflows/automerge.yml@main
    secrets:
      token: ${{ secrets.CI_BOT_TOKEN }}
