# This file is generated from athackst/ci/template/.github/ci-config.yml.jinja.
# Do not edit directly; update the template instead.

name-template: "Release v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template-file: ".github/release_template.md"
categories:
  - title: ':zap: Breaking'
    labels:
      - 'breaking'
      - 'major'
  - title: ':rocket: New'
    labels:
      - 'feature'
      - 'enhancement'
  - title: ':bug: Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: ':toolbox: Maintenance'
    labels:
      - 'maintenance'
      - 'devops'
  - title: ':memo: Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: 'Dependency Updates'
    label: 'dependencies'
    collapse-after: 3

exclude-labels:
  - 'skip-changelog'

version-resolver:
  major:
    labels:
      - 'breaking'
      - 'major'
  minor:
    labels:
      - 'feature'
      - 'minor'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'fix'
      - 'maintenance'
      - 'docs'
      - 'documentation'
      - 'devops'
      - 'dependencies'
      - 'security'

labels:
  breaking:
    - head-branch: ["^major", "^break"]
    - description: "Breaking or major-version change"
    - color: "#7f1d1d"

  bug:
    - head-branch: ['^fix', '^bug']
    - description: "Something isn't working"
    - color: "#d73a4a"

  enhancement:
    - head-branch: ["^feat", "^new", "^enhance"]
    - description: "New feature or request"
    - color: "#0f766e"
    
  maintenance:
    - head-branch: ['^chore', '^maint', '^noop', '^no-op', '^upkeep', '^dev']
    - changed-files:
      - any-glob-to-any-file: [".github/**", ".vscode/**"]
    - description: "Non-behavior related change"
    - color: "#0ea5e9"

  dependencies:
    - head-branch: ['^deps', '^dependencies']
    - description: "Pull requests that update a dependency file"
    - color: "#1d4ed8"

  documentation:
    - changed-files:
      - any-glob-to-any-file: "**/*.md"
    - head-branch: ["^doc"]
    - description: "Improvements or additions to documentation"
    - color: "#64748b"

  automerge:
    - head-branch: ['^dependabot/']
    - description: "Automatically merge"
    - color: "#eab308"

  good first issue:
    - description: "Good for newcomers"
    - color: "#c4b5fd"

  help wanted:
    - description: "Extra attention is needed"
    - color: "#db2777"

  question:
    - description: "Further information is requested"
    - color: "#7e22ce"

  duplicate:
    - description: "This is a duplicate"
    - color: "#cbd5e1"

  invalid:
    - description: "This doesn't seem right"
    - color: "#a3a3a3"
  
  wontfix:
    - description: "This will not be worked on"
    - color: "#78716c"
